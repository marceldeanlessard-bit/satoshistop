name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
    
    - name: Cache Prisma
      uses: actions/cache@v4
      with:
        path: backend/node_modules/.prisma
        key: ${{ runner.os }}-prisma-${{ hashFiles('**/schema.prisma') }}
    
    - name: Install deps & Prisma generate
      run: |
        cd backend
        npm ci
        npx prisma generate
    
    - name: Lint & Test Backend
      run: |
        cd backend
        npm run lint
        npm test -- --coverage
    
    - name: Build Docker Backend
      run: |
        cd backend
        docker build -t satoshistop-backend:latest .

  frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install deps
      run: |
        cd frontend
        npm ci
    
    - name: Lint & Build Frontend
      run: |
        cd frontend
        npm run lint
        npm run build --if-present
    
    - name: PWA Lighthouse Audit
      uses: treosh/lighthouse-ci-action@v11
      with:
        urls: 'http://localhost:5173/'
        temporaryPublicStorage: true

  docker:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Build & Push Multi-Stage Docker
      run: |
        docker-compose build
        docker tag satoshistop-backend satoshistop/satostop-backend:latest
        docker tag satoshistop-frontend satoshistop/satostop-frontend:latest
        docker push satoshistop/satostop-backend:latest
        docker push satoshistop/satostop-frontend:latest

  deploy-preview:
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'
    steps:
    - name: Deploy Preview
      run: echo '🚀 Preview deploy stub - Render/Vercel webhook'

  deploy-prod:
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Deploy Production
      run: echo '🚀 Production deploy to VPS - scp docker-compose.prod.yml + docker stack deploy'

permissions:
  contents: read
  pull-requests: write
