version: '3.9'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: satoshistop
      POSTGRES_USER: satoshi
      POSTGRES_PASSWORD: securepassword123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U satoshi -d satoshistop"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://satoshi:securepassword123@postgres:5432/satoshistop
      REDIS_URL: redis://redis:6379
      # Add other env vars
    volumes:
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npx prisma generate && npx prisma db push && npm start"

  frontend:
    build: ./frontend
    environment:
      - VITE_API_URL=http://backend:3000/api
    volumes:
      - frontend_build:/usr/share/nginx/html
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_build:/usr/share/nginx/html:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
  frontend_build:
